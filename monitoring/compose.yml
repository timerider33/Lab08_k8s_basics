services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    restart: unless-stopped
    # Чтоб прометеус мог стучаться на хост вне контейнера
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus:/etc/prometheus
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - ./grafana:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana

  blackbox:
    image: prom/blackbox-exporter
    container_name: blackbox
    # Явно укажем DNS т.к. есть странности с длительным резолвингом
    dns:
    - 192.168.1.57
    # Отдельный конфиг файл для блекбокса
    command:
      - "--config.file=/etc/blackbox_exporter/blackbox.yml"
    ports:
      - "9115:9115"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Добавили отдельный volume для файла с конфигом блекбокс 
    volumes:
      - ./blackbox:/etc/blackbox_exporter

volumes:
  prom_data:
  grafana_data:
